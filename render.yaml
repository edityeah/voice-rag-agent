# Render.com blueprint — free tier web service.
# Pair with: Neon Postgres (DATABASE_URL) + Hugging Face Space worker.
services:
  - type: web
    name: voice-rag-web
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: PUBLIC_URL
        sync: false        # set after first deploy
      - key: DATABASE_URL
        sync: false        # paste your Neon connection string
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
