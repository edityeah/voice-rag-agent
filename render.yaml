# Render.com blueprint — one-click deploys both the web app and the agent worker.
# After "New → Blueprint", point Render at this repo and fill in the env vars.
services:
  - type: web
    name: voice-rag-web
    runtime: docker
    plan: starter
    healthCheckPath: /
    envVars:
      - key: PUBLIC_URL
        sync: false        # set to https://<your-render-url>.onrender.com after first deploy
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: voice-rag-db
          property: connectionString

  - type: worker
    name: voice-rag-agent
    runtime: docker
    plan: starter
    dockerCommand: python voice_agent_openai.py start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: voice-rag-db
          property: connectionString

databases:
  - name: voice-rag-db
    plan: free
